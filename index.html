<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Permissions-Policy" content="geolocation=*">
    <meta name="description" content="Real-time weather information and forecasts for any city worldwide.">
    <title>Weather Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Weather Effects Layer -->
    <div id="weatherEffects" class="weather-effects">
        <canvas id="rainCanvas" class="effect-canvas hidden"></canvas>
        <canvas id="snowCanvas" class="effect-canvas hidden"></canvas>
        <div id="lightningFlash" class="lightning-flash hidden"></div>
        <div id="sunnyOverlay" class="sunny-overlay hidden"></div>
    </div>

    <div class="dashboard">
        <!-- Header -->
        <header class="header">
            <div>
                <h1>Weather Dashboard</h1>
                <p class="subtitle">Real-time weather information and forecasts</p>
            </div>
        </header>

        <!-- Search Row -->
        <div class="search-row">
            <div class="current-location" id="currentLocation">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                    <circle cx="12" cy="10" r="3" />
                </svg>
                <span id="locationLabel">Detecting location...</span>
                <button id="locBtn" title="Use my current location"
                    style="background:none;border:none;cursor:pointer;padding:0 0 0 6px;display:inline-flex;align-items:center;color:inherit;opacity:0.7;"
                    onclick="requestLocation()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3" />
                        <path d="M12 2v3M12 19v3M2 12h3M19 12h3" />
                        <path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2z" stroke-dasharray="2 3" />
                    </svg>
                </button>
            </div>
            <div class="search-box">
                <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#A0AEC0"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8" />
                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
                <input type="text" id="cityInput" placeholder="Search for a city..." autocomplete="off">
                <button id="searchBtn" type="button">Search</button>
            </div>
        </div>

        <!-- Loading Spinner -->
        <div id="loadingSpinner" class="spinner hidden">
            <div class="spinner-circle"></div>
        </div>

        <!-- Error Message -->
        <div id="errorMessage" class="error-message hidden"></div>

        <!-- Hero Weather Card -->
        <div id="heroCard" class="card hero-card hidden"></div>

        <!-- Middle Row: Hourly Forecast + Weather Details -->
        <div class="middle-row">
            <!-- Hourly Forecast -->
            <div id="hourlyCard" class="card hourly-card hidden">
                <h3 class="card-title">Hourly Forecast</h3>
                <canvas id="hourlyChart" width="800" height="200"></canvas>
                <div id="hourlyGrid" class="hourly-grid"></div>
            </div>

            <!-- Weather Details -->
            <div id="detailsCard" class="card details-card hidden">
                <h3 class="card-title">Weather Details</h3>
                <div id="detailsGrid" class="details-grid"></div>
            </div>
        </div>

        <!-- 7-Day Forecast -->
        <div id="forecastCard" class="card forecast-card hidden">
            <h3 class="card-title">7-Day Forecast</h3>
            <div id="forecastList" class="forecast-list"></div>
        </div>
    </div>

    <script src="script.js"></script>

</body>

</html>
